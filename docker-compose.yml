services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      HTTP_ADDR: ":8082"
      DATABASE_URL: "postgres://app:app@db:5432/app?sslmode=disable"
      JWT_ISSUER: "pipelineapp"
      JWT_ACCESS_SECRET: "change-me-access"
      JWT_REFRESH_SECRET: "change-me-refresh"
      JWT_ACCESS_TTL: "15m"
      JWT_REFRESH_TTL: "168h"
    depends_on:
      - db
    ports:
      # если 8082 занят локальным api.exe, снаружи будет 8083
      - "8083:8082"

volumes:
  pgdata:
